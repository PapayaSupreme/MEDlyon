
name: Java CI

on:
  workflow_call:

jobs:
  buildJavaApp:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
      with:
        sparse-checkout: |
          src

    - name: Set up JDK 26
      uses: actions/setup-java@v5
      with:
        java-version: '26'
        distribution: 'oracle'

    - name: Build Java application to jar file
      run: |
        jar -cf application.jar src/App.java src/Core/*.java src/parsers/*.java src/structure/*.java src/utilities/*.java

        if git status -s | grep -x "** application.jar"; then
          echo 'Created the jar file application.java without errors.'
        else
          echo "❌ Failed to create the jar file."
        fi

    - name: Upload_Jar_File
      uses: actions/upload-artifact@v7
      with:
        path: application.jar
        archive: false #The jar files are already archived (zipped)
        overwrite: true
