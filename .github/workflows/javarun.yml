
name: Manual and Pull

on:
    workflow_dispatch:
    pull_request:
        types: [opened, synchronize, reopened, review_requested]

jobs:
    InvokeBuild:
        uses: ./.github/workflows/javabuild.yml

    RunJavaApp:
        runs-on: ubuntu-latest
        needs: InvokeBuild
        steps:

          - uses: actions/checkout@v7
            with:
                sparse-checkout: |
                    raw_datasets/Datasets_download.sh
                sparse-checkout-cone-mode: false

          - name: Set up JDK 26
            uses: actions/setup-java@v5
            with:
                java-version: '26'
                distribution: 'oracle'

          - name: Download_Jar_File 
            uses: actions/download-artifact@v8
            with:
                name: application.jar

          - name: DownloadDatasets
            run: |
                chmod +x raw_datasets/Datasets_download.sh
                ./raw_datasets/Datasets_download.sh

          - name: LaunchApplication 
            #Java arg[1]="." arg[2]="." arg[3]="-noCli" /: arg[1] is the bus path, arg[2] is the metro path, arg[3] is for the option.
            run: |
                java -jar application.jar . . -noCli > o.txt 2> e.txt

                if git status -s | grep -x "?? e.txt"; then
                    echo "❌ There was an error :"
                    cat err.txt | echo
                else
                    echo 'The application ran and terminated normally.'
                fi

          - name: Upload_run_results
            uses: actions/upload-artifact@v7
            with:
                name: Run
                path: ./[eo].txt
                if-no-files-found: ignore
                
    #Now we can also test to launch the frontEnd application and 
                