
name: Npm test suite

on:
    workflow_dispatch:
    pull_request:
        types: [opened, synchronize, reopened, review_requested]

jobs:
    InvokeBuild:
        uses: ./.github/workflows/javabuild.yml
    Nodetest:
        needs: InvokeBuild
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v7
            with: 
                sparse-checkout: |
                    Server/roulyon

          - name: Download all node modules.
            run: |
                npm i
            working-directory: Server/roulyon

          - name: Build the static App with npm
            run: |
                npm run build
            working-directory: Server/roulyon

          - name: Upload built app
            uses: actions/upload-artifact@v7
            with:
                name: static_server
                path: ./Server/roulyon/dist/*