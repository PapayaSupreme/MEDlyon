# This workflow will build a Java project with Ant
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-ant

name: Java CI

on:
  push:
  pull_request:
    types: [opened, reopened]

jobs:
  buildJavaApp:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
      with:
        sparse-checkout: |
          src
    - name: Set up JDK 26
      uses: actions/setup-java@v5
      with:
        java-version: '26'
        distribution: 'oracle'
    - name: Build Java application to jar file
      run: |
        jar -cf application.jar src/App.java src/Core/*.java src/parsers/*.java src/structure/*.java src/utilities/*.java
        echo 'Created the jar file application.java without errors.'
        
