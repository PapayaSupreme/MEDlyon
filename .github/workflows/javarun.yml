
name: Manual and Pull

on:
    workflow_dispatch:
    pull_request:
        types: [opened, synchronize, reopened, review_requested]

jobs:
    InvokeBuild:
        uses: ./.github/workflows/javabuild.yml

    RunJavaApp:
        runs-on: ubuntu-latest
        needs: InvokeBuild
        steps:

          - uses: actions/checkout@v7
            with:
                sparse-checkout: |
                    raw_datasets/Datasets_download.sh
                sparse-checkout-cone-mode: false

          - name: Set up JDK 26
            uses: actions/setup-java@v5
            with:
                java-version: '26'
                distribution: 'oracle'

          - name: Download_Jar_File 
            uses: actions/download-artifact@v8
            with:
                name: application.jar

          #- name: DownloadDatasets
          #  run: |
          #      chmod +x raw_datasets/Datasets_download.sh
          #      ./raw_datasets/Datasets_download.sh

          - name: curl test
            uses: enflo/curl-action@2942c5316f0d493fdc1bf64020382b4aa597a128
            with:
                curl: -o "raw_datasets/metro/stations-metro-reseau-transports-commun-lyonnais.csv" -L "https://drive.usercontent.google.com/download?id=17hCUhL46OkZ6Am4ykDPDuCzSqhw_r0y-" --create-dirs 

          - name: VerifySetup
            run: |
                pwd
                ls *

          - name: LaunchApplication 
        # Original command :
        # java -cp application.jar src/App.java raw_datasets/bus/lyontcl raw_datasets/metro -noCli > out.txt 2> err.txt
            run: |
                java -jar application.jar raw_datasets/bus/lyontcl raw_datasets/metro -noCli 

                if git status -s | grep -x "** err.txt"; then
                    echo "❌ There was an error :"
                    cat err.txt | echo
                else
                    echo 'The application ran and terminated normally.'
                fi

          - name: Upload_run_results
            uses: actions/upload-artifact@v7
            with:
                name: Run
                path: ./*.txt
                if-no-files-found: ignore
                
    #Now we can also test to launch the frontEnd application and 
                